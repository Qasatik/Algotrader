name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pytest-asyncio
          # Install the lightweight deps needed for unit tests.
          # torch/pybit are heavy and fully mocked in tests.
          pip install numpy pandas pydantic pydantic-settings python-dotenv \
                      prometheus-client structlog tenacity \
                      python-telegram-bot cryptography

      - name: Lint (ruff)
        run: ruff check .

      - name: Type-check imports / compile
        run: |
          python -m py_compile main.py
          python -c "import ast,glob; [ast.parse(open(f).read()) for f in glob.glob('**/*.py', recursive=True)]"

      - name: Run tests
        env:
          BYBIT_TESTNET: "true"
          ML_DEVICE: "cpu"
        run: pytest -v
