name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pytest-asyncio
          # Install only the lightweight deps needed for unit tests
          # (torch/pybit are heavy; tests mock the exchange & use CPU numpy)
          pip install numpy pandas pydantic pydantic-settings python-dotenv \
                      prometheus-client structlog tenacity

      - name: Lint (ruff)
        run: ruff check .

      - name: Type-check imports / compile
        run: |
          python -m py_compile main.py
          python -c "import ast,glob; [ast.parse(open(f).read()) for f in glob.glob('**/*.py', recursive=True)]"

      - name: Run tests
        env:
          BYBIT_TESTNET: "true"
          ML_DEVICE: "cpu"
        run: pytest -v

  build-image:
    name: Build Docker image
    needs: lint-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push on PR)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: bybit-algo-bot:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
