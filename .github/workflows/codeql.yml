name: CodeQL Security

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "30 5 * * 1"  # weekly Monday 05:30 UTC

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ["python"]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      # Install lightweight deps so CodeQL can resolve imports.
      # Skip torch/pybit (heavy, not needed for static analysis).
      - name: Install dependencies for analysis
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas pydantic pydantic-settings python-dotenv \
                      prometheus-client structlog tenacity \
                      python-telegram-bot cryptography aiohttp

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
